<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid-ul-Adha Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#ffffff;
overflow-x:hidden;
color:#111;
}

/* BACKGROUND */
.sky{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#fff,#f7f7f7);
z-index:-5;
}

.glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,215,0,0.25),transparent 60%);
filter:blur(60px);
z-index:-4;
animation:move 10s infinite alternate;
}

@keyframes move{
from{transform:translate(-50px,-50px);}
to{transform:translate(50px,50px);}
}

/* STARS */
.star{
position:absolute;
width:2px;
height:2px;
background:#d4af37;
opacity:0.7;
animation:blink 2s infinite alternate;
z-index:-3;
}

@keyframes blink{
from{opacity:0.2;}
to{opacity:1;}
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding:20px;
}

h1{
font-size:3.5rem;
color:#b8860b;
}

.assalam{
margin-top:10px;
font-weight:600;
color:#444;
}

.sub{
max-width:700px;
margin-top:10px;
line-height:1.8;
color:#333;
}

/* MOON */
.moon{
width:160px;
height:160px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,#fff,#f2d16b);
box-shadow:0 0 30px rgba(255,215,0,0.4);
margin-bottom:20px;
transition:0.2s;
cursor:pointer;
}

.moon:hover{
transform:scale(1.1);
box-shadow:0 0 40px #ffd700,0 0 90px #ffd700;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
background:#b8860b;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
text-decoration:none;
}

/* MOSQUE */
.mosque{
position:absolute;
bottom:0;
width:100%;
height:220px;
background:url('https://i.ibb.co/FwXW0ZL/mosque.png') center bottom/contain no-repeat;
opacity:0.12;
}

/* WISHES */
.section{
padding:60px 20px;
max-width:900px;
margin:auto;
}

.title{
text-align:center;
font-size:2.4rem;
color:#b8860b;
margin-bottom:30px;
}

.wish-box{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

input{
padding:14px;
width:250px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

.msg{
background:#fff;
margin-top:10px;
padding:12px;
border-left:4px solid #b8860b;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* PARTICLES */
.particle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
pointer-events:none;
animation:rise 1.5s linear forwards;
box-shadow:0 0 10px gold;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-150px);opacity:0;}
}

footer{
text-align:center;
padding:40px;
color:#666;
border-top:1px solid #eee;
margin-top:40px;
}

</style>
</head>

<body>

<div class="sky"></div>
<div class="glow"></div>

<section class="hero">

<div class="moon" id="moon"></div>

<h1>Eid-ul-Adha Mubarak</h1>

<div class="assalam">Assalamualaikum 🌙</div>

<p class="sub">
May Allah bless you with peace, happiness and barakah.
</p>

<a href="#wishes" class="btn">Send Blessings</a>

<div class="mosque"></div>

</section>

<section class="section" id="wishes">

<h2 class="title">Send Wishes</h2>

<div class="wish-box">
<input type="text" id="input" placeholder="Write your Eid wish...">
<button class="btn" onclick="addWish()">Send</button>
</div>

<div id="msgs"></div>

</section>

<footer>
This is from UNAIS UDDIN 🤍
</footer>

<script>

/* STARS */
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
document.body.appendChild(s);
}

/* WISHES */
function addWish(){
let input=document.getElementById("input");
if(input.value.trim()==="") return;

let div=document.createElement("div");
div.className="msg";
div.innerText="🌙 "+input.value;

document.getElementById("msgs").prepend(div);
input.value="";
}

/* FIXED + THROTTLED PARTICLES */
const moon=document.getElementById("moon");
let last=0;

moon.addEventListener("mousemove",(e)=>{

const now=Date.now();
if(now-last<40) return;
last=now;

const rect=moon.getBoundingClientRect();

for(let i=0;i<5;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=(rect.left+rect.width/2)+"px";
p.style.top=(rect.top+rect.height/2)+"px";

p.style.transform=`translate(${Math.random()*80-40}px,0px)`;

document.body.appendChild(p);

setTimeout(()=>p.remove(),1500);

}

});

</script>

</body>
</html>
